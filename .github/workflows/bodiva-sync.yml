name: Sync BODIVA Market Data

on:
  schedule:
    - cron: '*/15 * * * *'   # Executa a cada 15 minutos
  workflow_dispatch:          # Permite execução manual

jobs:
  sync-bodiva:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install xlsx @supabase/supabase-js dotenv

      - name: Download BODIVA Excel
        run: |
          curl -k -L --fail --retry 3 --retry-delay 5 \
          -o bodiva_data.xlsx \
          "https://www.bodiva.ao/reports/controllers/excel/Export/ResumoMercados.php" \
          --max-time 60

      - name: Validar ficheiro
        run: |
          if [ ! -s bodiva_data.xlsx ]; then
            echo "❌ Ficheiro vazio ou download falhou"
            exit 1
          fi

      - name: Convert and Upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node convert.js
          node upload.js

      - name: Cleanup
        run: rm -f bodiva_data.xlsx bodiva_data.json
